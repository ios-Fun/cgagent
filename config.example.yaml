# ============================================================
# cgagent 统一配置（项目根目录）
# 优先级（高 → 低）：
#   config.local.yaml > config.yaml > 环境变量/.env > 代码默认值
# 即：根目录 YAML 配了就用 YAML；没配才用别的。
# ============================================================

# -------------------- 服务 / Gateway --------------------
server:
  host: "0.0.0.0"
  port: 8000
  debug: true
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"
    - "http://127.0.0.1:3000"

# -------------------- 数据库 / Redis --------------------
database:
  url: "sqlite:///./agent_framework.db"

redis:
  url: "redis://localhost:6379/0"
  # 若使用 agent/memory/redis_memory.py 旧连接，可在此覆盖
  host: "192.168.0.58"
  port: 6379
  db: 0
  password: "mypassword"

# -------------------- 意图 / Rasa --------------------
rasa:
  url: "http://192.168.0.106:5005/webhooks/rest/webhook"

# -------------------- Skills --------------------
skills:
  # 技能目录（相对项目根或绝对路径）
  dir: "skills"
  # 当前 Rasa 索引对应的技能顺序（coordinator 用）
  enabled:
    - "device-healthy"
    - "tag-trend"
    - "unit-healthy"

# -------------------- LLM（Coordinator / 通用）--------------------
llm:
  provider: "ollama"          # openai | anthropic | ollama | zhipu
  model: "Jarcgon/Qwen3.6-35B-A3B-Claude-4.7-Opus-abliterated-uncenfull"
  api_key: ""
  base_url: "http://192.168.0.54:11434"
  temperature: 0.4
  max_tokens: 8192
  timeout: 60

# 对话合成（generate_context）专用，可与上面 llm 不同
synthesis_llm:
  model: "Jarcgon/Qwen3.6-35B-A3B-Claude-4.7-Opus-abliterated-uncenfull"
  base_url: "http://192.168.0.54:11434"
  temperature: 0.4
  max_tokens: 8192
  system_template: |
    你是一位电力行业的**预警分析专家**。你需要综合利用设备诊断、故障推导、实时测点和历史知识，对设备健康状态进行评估，并给出分级处理建议。

# -------------------- Token 预算 --------------------
budget:
  total_limit: 100000
  warning_threshold: 0.8
  enable_compression: true

# -------------------- 执行 --------------------
execution:
  max_skill_retries: 2
  enable_streaming: true
  enable_audit_log: true
  enable_metrics: true
  enable_replan: true
  confidence_threshold: 0.5

# -------------------- 长期记忆（SQLite 画像）--------------------
memory:
  enabled: true
  injection_enabled: true
  use_llm_update: true
  use_rule_fallback: true
  debounce_seconds: 5
  max_facts: 100
  fact_confidence_threshold: 0.7
  max_injection_tokens: 2000
  guaranteed_categories:
    - "correction"
  guaranteed_token_budget: 500
  # 记忆更新专用 LLM（默认与 synthesis_llm / llm 对齐）
  llm:
    model: "Jarcgon/Qwen3.6-35B-A3B-Claude-4.7-Opus-abliterated-uncenfull"
    base_url: "http://192.168.0.54:11434"
    temperature: 0.2

# -------------------- MCP --------------------
mcp:
  # MultiServerMCPClient connections
  servers:
    mcp-device-sse:
      transport: "sse"
      url: "http://192.168.0.58:8084/sse"
  # 示例（可扩展多服务）:
  # another-mcp:
  #   transport: "sse"
  #   url: "http://127.0.0.1:9000/sse"

# -------------------- 路径（可选）--------------------
paths:
  skills_dir: "skills"
  project_root: "."
